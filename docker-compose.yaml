services:
  java-api:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: deteccao-falhas-java-api
    working_dir: /workspace
    command: ./mvnw spring-boot:run
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/deteccao_falhas
      SPRING_DATASOURCE_USERNAME: deteccao
      SPRING_DATASOURCE_PASSWORD: deteccao
      PYTHON_SERVICE_URL: http://python-detector:8000
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      python-detector:
        condition: service_started
    networks:
      - deteccao-network

  python-detector:
    image: python:3.12-slim
    container_name: deteccao-falhas-python-detector
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/models/parafusos-falhas.pkl
    volumes:
      - ./python-service:/app
    networks:
      - deteccao-network

  postgres:
    image: postgres:16-alpine
    container_name: deteccao-falhas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: deteccao_falhas
      POSTGRES_USER: deteccao
      POSTGRES_PASSWORD: deteccao
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deteccao -d deteccao_falhas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deteccao-network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: deteccao-falhas-pgadmin
    profiles:
      - tools
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@deteccao.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - deteccao-network

volumes:
  maven-cache:
  postgres-data:
  pgadmin-data:

networks:
  deteccao-network:
    driver: bridge
